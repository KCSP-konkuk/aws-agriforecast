name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "KCSPback/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend jar
        working-directory: KCSPback
        run: chmod +x gradlew && ./gradlew clean build -x test

      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: KCSPback/build/libs/backend-0.0.1-SNAPSHOT.jar
          target: /home/ubuntu/deploy

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/agri-forecast
            sudo cp /home/ubuntu/deploy/KCSPback/build/libs/backend-0.0.1-SNAPSHOT.jar /opt/agri-forecast/backend-0.0.1-SNAPSHOT.jar
            PIDS=$(ps -eo pid=,comm=,args= | awk '$2 == "java" && $0 ~ /backend-0.0.1-SNAPSHOT.jar/ {print $1}')
            if [ -n "$PIDS" ]; then
              kill $PIDS
              sleep 3
            fi
            sudo touch /opt/agri-forecast/app.log
            sudo chown ubuntu:ubuntu /opt/agri-forecast/app.log
            nohup java -jar /opt/agri-forecast/backend-0.0.1-SNAPSHOT.jar --spring.config.additional-location=file:/opt/agri-forecast/application-secret.properties >> /opt/agri-forecast/app.log 2>&1 &
            sleep 5
            ps -eo pid=,comm=,args= | awk '$2 == "java" && $0 ~ /backend-0.0.1-SNAPSHOT.jar/ {print}'
