name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "KCSPback/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend jar
        working-directory: KCSPback
        run: chmod +x gradlew && ./gradlew clean build -x test

      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: KCSPback/build/libs/backend-0.0.1-SNAPSHOT.jar
          target: /home/ubuntu/deploy

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/agri-forecast
            sudo cp /home/ubuntu/deploy/KCSPback/build/libs/backend-0.0.1-SNAPSHOT.jar /opt/agri-forecast/backend-0.0.1-SNAPSHOT.jar
            pkill -f 'backend-0.0.1-SNAPSHOT.jar' || true
            cd /opt/agri-forecast
            nohup java -jar backend-0.0.1-SNAPSHOT.jar --spring.config.additional-location=file:./application-secret.properties > app.log 2>&1 &
            sleep 5
            pgrep -af 'backend-0.0.1-SNAPSHOT.jar'
